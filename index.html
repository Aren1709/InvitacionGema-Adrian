<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nos Casamos</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #F1F0F1;
  font-family: 'Georgia', serif;
  overflow: hidden;
}

/* Texto superior */
.hint {
  text-align: center;
  margin-bottom: 25px;
  color: #8b2c3f;
  font-size: 22px;
  letter-spacing: 1px;
  animation: fadeIn 2s ease-in-out;
}

.hint strong {
  font-weight: normal;
}

.arrow {
  font-size: 26px;
  display: block;
  margin-top: 10px;
  animation: bounce 1.5s infinite;
}

/* Contenedor 3D */
.card-container {
  perspective: 1200px;
}

/* Tarjeta */
.card {
  width: 380px;
  height: 630px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s ease;
  cursor: pointer;
}

.card.flip {
  transform: rotateY(180deg);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* Caras */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 25px 50px rgba(0,0,0,0.15);
  background: white;
}

.back {
  transform: rotateY(180deg);
}

/* Animaciones */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive móvil */
@media (max-width: 480px) {
  .card {
    width: 90vw;
    height: 150vw;
  }
}
</style>
</head>

<body>

<div class="hint">
  Gema y Adrián te han invitado a su boda
  <span class="arrow">↓ Toca la invitación y déjala cobrar vida ↓</span>
</div>

<div class="card-container">
  <div class="card" onclick="this.classList.toggle('flip')">
    <div class="front">
      <img src="frontal.png" alt="Invitación Frente">
    </div>
    <div class="back">
      <img src="reverso.png" alt="Invitación Reverso">
    </div>
  </div>
</div>

</body>
</html>
