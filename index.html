<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gema & Adrian te han invitado a su boda</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #F1F0F1;
  font-family: 'Georgia', serif;
  overflow: hidden;
}

/* Texto superior */
.hint {
  text-align: center;
  margin-bottom: 25px;
  color: #8b2c3f;
  font-size: 22px;
  letter-spacing: 1px;
  animation: fadeIn 1.5s ease-in-out;
  transition: opacity 0.4s ease;
}

.arrow {
  font-size: 26px;
  display: block;
  margin-top: 10px;
  animation: bounce 1.5s infinite;
}

/* Contenedor 3D */
.card-container {
  perspective: 1200px;
}

/* Tarjeta */
.card {
  width: 380px;
  height: 630px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s ease;
  cursor: pointer;
}

.card.flip {
  transform: rotateY(180deg);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* Caras */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 25px 50px rgba(0,0,0,0.15);
  background: white;
}

.back {
  transform: rotateY(180deg);
}

/* Animaciones */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive móvil */
@media (max-width: 480px) {
  .card {
    width: 90vw;
    height: 150vw;
  }
}
</style>
</head>

<body>

<div class="hint" id="mainText">
  Gema y Adrián te han invitado a su boda
  <span class="arrow">↓ Toca la invitación para descubrir más ↓</span>
</div>

<div class="card-container">
  <div class="card" onclick="flipCard(this)">
    <div class="front">
      <img src="frontal.png" alt="Invitación Frente">
    </div>
    <div class="back">
      <img src="reverso.png" alt="Invitación Reverso">
    </div>
  </div>
</div>

<script>
function flipCard(card) {
  card.classList.toggle("flip");

  const text = document.getElementById("mainText");

  if (card.classList.contains("flip")) {
    text.innerHTML = `
      Nos encantaría verte allí en nuestro día más importante
      <span class="arrow">Rogamos confirmación de asistencia</span>
    `;
  } else {
    text.innerHTML = `
      Gema y Adrián te han invitado a su boda
      <span class="arrow">↓ Toca la invitación para descubrir más ↓</span>
    `;
  }
}
</script>

</body>
</html>
