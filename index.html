<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nos Casamos</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #ffffff;
  font-family: 'Georgia', serif;
  overflow: hidden;
}

/* Texto superior */
.hint {
  text-align: center;
  margin-bottom: 25px;
  color: #8b2c3f;
  font-size: 20px;
  letter-spacing: 1px;
  animation: fadeIn 2s ease-in-out;
}

.arrow {
  font-size: 28px;
  display: block;
  animation: bounce 1.5s infinite;
}

/* Contenedor 3D */
.card-container {
  perspective: 1200px;
}

/* Tarjeta */
.card {
  width: 380px;          /* MÁS GRANDE */
  height: 630px;         /* proporción elegante */
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s ease;
  cursor: pointer;
}

.card.flip {
  transform: rotateY(180deg);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* Caras */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 25px 50px rgba(0,0,0,0.15);
  background: white;
}

.back {
  transform: rotateY(180deg);
}

/* Animaciones */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive móvil */
@media (max-width: 480px) {
  .card {
    width: 90vw;
    height: 150vw;
  }
}
</style>
</head>

<body>

<div class="hint" id="hint">
  Nuestra invitación tiene una sorpresa
  <span class="arrow">↓ Haz clic para descubrirla ↓</span>
</div>

<div class="card-container">
  <div class="card" onclick="flipCard(this)">
    <div class="front">
      <img src="frontal.png" alt="Invitación Frente">
    </div>
    <div class="back">
      <img src="reverso.png" alt="Invitación Reverso">
    </div>
  </div>
</div>

<script>
function flipCard(card) {
  card.classList.toggle("flip");
  document.getElementById("hint").style.opacity = "0";
}
</script>

</body>
</html>
