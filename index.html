<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nos Casamos</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f5f3ef;
  font-family: Arial, sans-serif;
}

.card-container {
  perspective: 1000px;
}

.card {
  width: 300px;
  height: 500px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s;
  cursor: pointer;
}

.card.flip {
  transform: rotateY(180deg);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 15px;
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.back {
  transform: rotateY(180deg);
}
</style>
</head>
<body>

<div class="card-container">
  <div class="card" onclick="this.classList.toggle('flip')">
    <div class="front">
      <img src="frontal.jpg" alt="Invitación Frente">
    </div>
    <div class="back">
      <img src="reverso.jpg" alt="Invitación Reverso">
    </div>
  </div>
</div>

</body>
</html>
